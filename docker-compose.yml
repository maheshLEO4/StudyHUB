version: "3.8"
services:
  mongodb:
    image: mongo:7
    container_name: studyhub-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: studyhub
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: studyhub-api
    restart: unless-stopped
    depends_on: [ mongodb ]
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/studyhub
      JWT_SECRET: your_production_jwt_secret_here
      JWT_EXPIRE: 7d
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: studyhub-app
    restart: unless-stopped
    depends_on: [ backend ]
    # REACT_APP_API_URL is omitted to use relative /api path (proxied by Nginx)
    ports:
      - "3000:3000"

volumes:
  mongo-data:


