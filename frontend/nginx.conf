server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the LIVE Render backend
    location /api/ {
        proxy_pass https://study-hub-gs7x.onrender.com/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host study-hub-gs7x.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Critical for SNI with Render/Cloudflare
        proxy_ssl_server_name on;
        proxy_ssl_name study-hub-gs7x.onrender.com;
        
        proxy_cache_bypass $http_upgrade;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}